# Runs the testthat tests automatically on GitHub.
# Triggered on every push and pull request. A green check means all tests
# passed; a red X means a test failed (click it to see which one).
name: tests

on:
  push:
  pull_request:
  workflow_dispatch:   # lets you also run it manually from the Actions tab

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::testthat
            any::devtools
          needs: check

      - name: Run testthat tests
        run: Rscript -e 'devtools::test(stop_on_failure = TRUE)'
        shell: bash
